<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Rapoarte Vânzări · Medima Health</title>
<meta name="theme-color" content="#37008D"/>
<meta property="og:type" content="website"/><meta property="og:locale" content="ro_RO"/>
<meta property="og:site_name" content="Medima Health"/>
<meta property="og:title" content="Rapoarte Vânzări · Medima Health"/>
<meta property="og:description" content="Rapoarte lunare de vânzări Medima Health, pe rețea și pe clinică."/>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@600;700;800;900&family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Red Hat Text',system-ui,sans-serif;background:#E7E3EE;min-height:100vh;display:flex;justify-content:center;padding:32px 14px 48px;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:420px;}
.header{background:#37008D;border-radius:20px;padding:22px 22px 20px;position:relative;overflow:hidden;margin-bottom:22px;}
.header::after{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;border-radius:50%;border:9px solid rgba(174,168,255,0.16);}
.logo{height:34px;display:block;margin-bottom:14px;}
.header h1{font-family:'Red Hat Display',sans-serif;font-size:19px;font-weight:800;color:#fff;letter-spacing:-0.01em;position:relative;z-index:1;}
.header p{font-size:12px;color:#AEA8FF;margin-top:5px;font-weight:500;position:relative;z-index:1;}
.section-label{font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:#7D5DE7;margin:0 4px 10px;}
.card{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #ECE8F5;border-radius:16px;padding:16px 18px;margin-bottom:12px;text-decoration:none;box-shadow:0 4px 16px rgba(55,0,141,0.06);transition:box-shadow .16s ease,transform .16s ease;}
.card:hover{box-shadow:0 8px 24px rgba(55,0,141,0.14);transform:translateY(-1px);}
.card .month{font-family:'Red Hat Display',sans-serif;font-size:16px;font-weight:800;color:#151129;}
.card .sub{font-size:11px;color:#9385B8;margin-top:3px;font-weight:500;}
.card .arrow{font-family:'Red Hat Display',sans-serif;font-size:20px;font-weight:900;color:#7D5DE7;}
.footer{text-align:center;padding:22px 16px 0;}
.footer-main{font-size:11px;font-weight:700;color:#7D5DE7;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img class="logo" src="medima_logo_white.png" alt="Medima Health"/>
    <h1>Rapoarte Vânzări</h1>
    <p>Rețea Medima Health · pe luni</p>
  </div>

  <div class="section-label">2026</div>
  <a class="card" href="2026-06/">
    <div><div class="month">Iunie 2026</div><div class="sub">Vânzări rețea · YTD Ian–Iun</div></div>
    <div class="arrow">›</div>
  </a>
  <a class="card" href="2026-05/">
    <div><div class="month">Mai 2026</div><div class="sub">Vânzări rețea · YTD Ian–Mai</div></div>
    <div class="arrow">›</div>
  </a>

  <div class="footer"><div class="footer-main">Medima Health · Sumar Vânzări</div></div>
</div>
</body>
</html>
